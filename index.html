<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>K-ATFM 흐름관리</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --warning-bg: #fff7ed;
      --warning-border: #fb923c;
      --empty-bg: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 14px;
    }

    .header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 18px 16px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.35;
    }

    .menu-card {
      background: var(--card);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .menu-row {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      min-height: 118px;
    }

    .menu-name {
      font-weight: 800;
      margin-bottom: 6px;
      font-size: 14px;
      line-height: 1.25;
    }

    .count-line {
      min-height: 22px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.35;
    }

    .count-pill {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #111827;
      font-size: 11px;
      font-weight: 800;
      margin-right: 3px;
      margin-bottom: 2px;
    }

    .count-pill.active {
      background: #fee2e2;
      color: #991b1b;
    }

    .button-row {
      display: flex;
      gap: 6px;
    }

    button {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 14px;
      height: 34px;
      padding: 0 10px;
      cursor: pointer;
      font-weight: 800;
      min-width: 0;
      flex: 1;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      background: var(--card);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .result {
      margin-top: 12px;
    }

    .notice {
      background: var(--empty-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .notice.warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: #9a3412;
    }

    .notice.error {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    .group-title {
      margin: 16px 0 8px;
      font-size: 17px;
      font-weight: 800;
    }

    .summary {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 14px;
      padding: 11px 13px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #1e40af;
      line-height: 1.45;
    }

    .item-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 800;
      background: #dbeafe;
      color: #1e40af;
    }

    .badge.ctot {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.ufn {
      background: #fef3c7;
      color: #92400e;
    }

    .field {
      margin: 6px 0;
      line-height: 1.45;
      font-size: 13px;
    }

    .field strong {
      display: inline-block;
      min-width: 82px;
      color: #374151;
    }

    .reg-box {
      white-space: pre-wrap;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 11px;
      margin-top: 9px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
      overflow-x: auto;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 16px 0 8px;
    }

    .loading {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid #d1d5db;
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (min-width: 720px) {
      .header h1 {
        font-size: 28px;
      }

      .menu-row {
        min-height: 128px;
      }

      button {
        height: 36px;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 12px;
      }

      .header {
        padding: 18px 15px;
      }

      .header h1 {
        font-size: 23px;
      }

      .header p {
        font-size: 13px;
      }

      .menu-card {
        padding: 13px;
      }

      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
      }

      .menu-row {
        padding: 9px;
        min-height: 112px;
      }

      .menu-name {
        font-size: 13px;
      }

      .count-line {
        font-size: 11px;
      }

      button {
        height: 32px;
        font-size: 13px;
        padding: 0 6px;
      }

      .field strong {
        display: block;
        margin-bottom: 2px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>K-ATFM 흐름관리</h1>
      <p>인천 FIR / 중국·유럽 / 중국·동남아 / 일본·미주 방향 ATFM Regulation 조회</p>
    </div>

    <div class="menu-card">
      <div class="section-title">조회 메뉴</div>

      <div class="menu-grid">
        <div class="menu-row">
          <div class="menu-name">인천 FIR</div>
          <div class="count-line">
            <span id="count-ICN_FIR" class="count-pill">0</span>
          </div>
          <div class="button-row">
            <button onclick="loadAtfm('ICN_FIR')">조회</button>
          </div>
        </div>

        <div class="menu-row">
          <div class="menu-name">중국/유럽 방향</div>
          <div class="count-line">
            <span id="count-CHINA_EUROPE_IN" class="count-pill">IN: 0</span>
            <span id="count-CHINA_EUROPE_OUT" class="count-pill">OUT: 0</span>
          </div>
          <div class="button-row">
            <button onclick="loadAtfm('CHINA_EUROPE_IN')">IN</button>
            <button onclick="loadAtfm('CHINA_EUROPE_OUT')">OUT</button>
          </div>
        </div>

        <div class="menu-row">
          <div class="menu-name">중국/동남아 방향</div>
          <div class="count-line">
            <span id="count-CHINA_SEA_IN" class="count-pill">IN: 0</span>
            <span id="count-CHINA_SEA_OUT" class="count-pill">OUT: 0</span>
          </div>
          <div class="button-row">
            <button onclick="loadAtfm('CHINA_SEA_IN')">IN</button>
            <button onclick="loadAtfm('CHINA_SEA_OUT')">OUT</button>
          </div>
        </div>

        <div class="menu-row">
          <div class="menu-name">일본/미주 방향</div>
          <div class="count-line">
            <span id="count-JAPAN_US_IN" class="count-pill">IN: 0</span>
            <span id="count-JAPAN_US_OUT" class="count-pill">OUT: 0</span>
          </div>
          <div class="button-row">
            <button onclick="loadAtfm('JAPAN_US_IN')">IN</button>
            <button onclick="loadAtfm('JAPAN_US_OUT')">OUT</button>
          </div>
        </div>
      </div>
    </div>

    <div class="status">
      <div id="statusText">대기 중</div>
      <div id="timeText"></div>
    </div>

    <div id="result" class="result">
      <div class="notice">
        접속 후 자동으로 전체 조회가 실행됩니다.
      </div>
    </div>

    <div class="footer">
      Source: K-ATFM / Google Apps Script Proxy
    </div>
  </div>

  <script>
    /****************************************************
     * 설정
     ****************************************************/

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxuwOKvvNkyUTGGC6JNfOHrrvippDBU2Z3Q4cto_DoPrU1znbWcS94TTlRLRtzjqehB/exec";

    const LABEL_MAP = {
      ICN_FIR: "인천 FIR",
      CHINA_EUROPE_IN: "중국/유럽 방향 IN",
      CHINA_EUROPE_OUT: "중국/유럽 방향 OUT",
      CHINA_SEA_IN: "중국/동남아 방향 IN",
      CHINA_SEA_OUT: "중국/동남아 방향 OUT",
      JAPAN_US_IN: "일본/미주 방향 IN",
      JAPAN_US_OUT: "일본/미주 방향 OUT"
    };

    let isLoading = false;

    /****************************************************
     * 최초 자동 조회
     ****************************************************/

    window.addEventListener("DOMContentLoaded", function () {
      loadAllAtfm();
    });

    /****************************************************
     * 단일 메뉴 조회
     ****************************************************/

    async function loadAtfm(key) {
      if (isLoading) return;

      setLoading(true, `${LABEL_MAP[key] || key} 조회 중...`);

      try {
        const url = `${GAS_URL}?action=get&key=${encodeURIComponent(key)}&_=${Date.now()}`;
        const data = await fetchJson(url);

        if (!data.success) {
          handleApiError(data);
          return;
        }

        renderSingleResult(data);

      } catch (err) {
        showError("조회 중 오류가 발생했습니다.<br>" + escapeHtml(err.message));
      } finally {
        setLoading(false);
      }
    }

    /****************************************************
     * 전체 자동 조회
     ****************************************************/

    async function loadAllAtfm() {
      if (isLoading) return;

      setLoading(true, "전체 조회 중...");

      try {
        const url = `${GAS_URL}?action=all&_=${Date.now()}`;
        const data = await fetchJson(url);

        if (!data.success) {
          handleApiError(data);
          return;
        }

        renderAllResult(data);

      } catch (err) {
        showError("전체 조회 중 오류가 발생했습니다.<br>" + escapeHtml(err.message));
      } finally {
        setLoading(false);
      }
    }

    /****************************************************
     * Fetch
     ****************************************************/

    async function fetchJson(url) {
      const response = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.json();
    }

    /****************************************************
     * Render
     ****************************************************/

    function renderSingleResult(data) {
      const result = document.getElementById("result");

      let html = `
        <div class="group-title">${escapeHtml(data.label)}</div>
        <div class="summary">
          총 ${data.count || 0}건
          ${data.updatedAt ? `<br>조회시각: ${formatDateTime(data.updatedAt)}` : ""}
        </div>
      `;

      if (!data.items || data.items.length === 0) {
        html += `
          <div class="notice">
            현재 표시할 ATFM Regulation이 없습니다.
          </div>
        `;
      } else {
        html += data.items.map(renderItemCard).join("");
      }

      result.innerHTML = html;
      setStatus(`${data.label} 조회 완료 / ${data.count || 0}건`);
    }

    function renderAllResult(data) {
      updateMenuCounts(data.groups || []);

      const result = document.getElementById("result");
      const groups = data.groups || [];
      const totalItems = groups.reduce((sum, g) => sum + (g.count || 0), 0);

      let html = `
        <div class="group-title">전체 조회 결과</div>
        <div class="summary">
          전체 ${groups.length}개 메뉴 / Regulation ${totalItems}건
          ${data.updatedAt ? `<br>조회시각: ${formatDateTime(data.updatedAt)}` : ""}
        </div>
      `;

      groups.forEach(group => {
        html += `<div class="group-title">${escapeHtml(group.label)}</div>`;

        if (!group.success) {
          html += `
            <div class="notice error">
              조회 실패: ${escapeHtml(group.message || "Unknown error")}
            </div>
          `;
          return;
        }

        if (!group.items || group.items.length === 0) {
          html += `
            <div class="notice">
              현재 표시할 ATFM Regulation이 없습니다.
            </div>
          `;
          return;
        }

        html += group.items.map(renderItemCard).join("");
      });

      result.innerHTML = html;
      setStatus(`전체 조회 완료 / Regulation ${totalItems}건`);
    }

    function renderItemCard(item) {
      const ctotBadge = item.ctotIssued
        ? `<span class="badge ctot">CTOT</span>`
        : "";

      const ufnBadge = item.isUfn
        ? `<span class="badge ufn">UFN</span>`
        : "";

      return `
        <div class="item-card">
          <div class="item-head">
            <div>
              <span class="badge">${escapeHtml(item.status || "ATFM")}</span>
              ${ctotBadge}
              ${ufnBadge}
            </div>
            <div style="font-size:13px;color:#6b7280;">
              #${item.no || ""}
            </div>
          </div>

          <div class="field">
            <strong>방향</strong>
            ${escapeHtml(item.label || item.dirString || "")}
          </div>

          <div class="field">
            <strong>Published</strong>
            ${escapeHtml(formatKatfmTime(item.publishedTime))}
          </div>

          <div class="field">
            <strong>Valid</strong>
            ${escapeHtml(formatKatfmValid(item))}
          </div>

          <div class="field">
            <strong>Reason</strong>
            ${escapeHtml(item.reason || "N/A")}
          </div>

          <div class="reg-box">${escapeHtml(item.regulation || item.rawText || "No regulation text")}</div>
        </div>
      `;
    }

    /****************************************************
     * Count Badge
     ****************************************************/

    function updateMenuCounts(groups) {
      const counts = {
        ICN_FIR: 0,
        CHINA_EUROPE_IN: 0,
        CHINA_EUROPE_OUT: 0,
        CHINA_SEA_IN: 0,
        CHINA_SEA_OUT: 0,
        JAPAN_US_IN: 0,
        JAPAN_US_OUT: 0
      };

      groups.forEach(group => {
        if (!group || !group.key) return;
        if (counts[group.key] !== undefined) {
          counts[group.key] = group.count || 0;
        }
      });

      setSingleCount("count-ICN_FIR", counts.ICN_FIR);

      setDirectionCount("count-CHINA_EUROPE_IN", "IN", counts.CHINA_EUROPE_IN);
      setDirectionCount("count-CHINA_EUROPE_OUT", "OUT", counts.CHINA_EUROPE_OUT);

      setDirectionCount("count-CHINA_SEA_IN", "IN", counts.CHINA_SEA_IN);
      setDirectionCount("count-CHINA_SEA_OUT", "OUT", counts.CHINA_SEA_OUT);

      setDirectionCount("count-JAPAN_US_IN", "IN", counts.JAPAN_US_IN);
      setDirectionCount("count-JAPAN_US_OUT", "OUT", counts.JAPAN_US_OUT);
    }

    function setSingleCount(id, count) {
      const el = document.getElementById(id);
      if (!el) return;

      el.textContent = count;

      if (count > 0) {
        el.classList.add("active");
      } else {
        el.classList.remove("active");
      }
    }

    function setDirectionCount(id, label, count) {
      const el = document.getElementById(id);
      if (!el) return;

      el.textContent = `${label}: ${count}`;

      if (count > 0) {
        el.classList.add("active");
      } else {
        el.classList.remove("active");
      }
    }

    /****************************************************
     * Error / Status
     ****************************************************/

    function handleApiError(data) {
      if (data.errorType === "LOCK_TIMEOUT") {
        document.getElementById("result").innerHTML = `
          <div class="notice warning">
            현재 다른 사용자가 조회 중입니다.<br>
            잠시 후 다시 조회해주세요.
          </div>
        `;
        setStatus("다른 사용자 조회 중");
        return;
      }

      showError(data.message || "조회 실패");
    }

    function showError(message) {
      document.getElementById("result").innerHTML = `
        <div class="notice error">
          ${message}
        </div>
      `;
      setStatus("오류 발생");
    }

    function setLoading(loading, message) {
      isLoading = loading;

      const buttons = document.querySelectorAll("button");
      buttons.forEach(btn => btn.disabled = loading);

      if (loading) {
        setStatus(`<span class="loading"></span>${message || "조회 중..."}`);
      }
    }

    function setStatus(message) {
      document.getElementById("statusText").innerHTML = message;
      document.getElementById("timeText").textContent = getNowText();
    }

    /****************************************************
     * Time Format
     ****************************************************/

    function formatKatfmTime(value) {
      if (!value) return "N/A";

      const text = String(value).trim();

      if (text.toUpperCase() === "UFN") return "UFN";

      const m = text.match(/^(\d{2})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})$/);
      if (!m) return text;

      const mm = m[1];
      const dd = m[2];
      const yy = m[3];
      const hh = m[4];
      const min = m[5];

      const monthMap = {
        "01": "JAN",
        "02": "FEB",
        "03": "MAR",
        "04": "APR",
        "05": "MAY",
        "06": "JUN",
        "07": "JUL",
        "08": "AUG",
        "09": "SEP",
        "10": "OCT",
        "11": "NOV",
        "12": "DEC"
      };

      const year = Number(yy) >= 70 ? "19" + yy : "20" + yy;
      const mon = monthMap[mm] || mm;

      return `${dd}${mon},${year} ${hh}:${min}Z`;
    }

    function formatKatfmValid(item) {
      const from = formatKatfmTime(item.validFrom);
      const until = formatKatfmTime(item.validUntil);

      if (from === "N/A" && until === "N/A") return "N/A";
      if (until === "N/A") return from;

      return `${from} ~ ${until}`;
    }

    /****************************************************
     * Utils
     ****************************************************/

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getNowText() {
      const d = new Date();
      return d.toLocaleString("ko-KR", {
        hour12: false,
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatDateTime(value) {
      try {
        const d = new Date(value);
        return d.toLocaleString("ko-KR", {
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      } catch (err) {
        return value;
      }
    }
  </script>
</body>
</html>
